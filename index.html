<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ Driver | Emergency Response v2</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --resq-red: #E53935;
            --resq-dark: #0D1B2A;
            --resq-green: #00C853;
            --resq-gray: #F4F7F6;
            --glass: rgba(255, 255, 255, 0.9);
            --warning-amber: #FFAB00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--resq-dark);
        }

        /* Device Frame */
        .device-container {
            width: 385px;
            height: 844px;
            background: var(--resq-gray);
            border-radius: 40px;
            border: 12px solid #1a1a1a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        /* Header with Hospital Context */
        header {
            background: white;
            padding: 45px 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            z-index: 20;
        }

        .hosp-info h4 { font-size: 13px; font-weight: 800; color: var(--resq-dark); }
        .hosp-info p { font-size: 10px; color: #888; letter-spacing: 1px; }

        .live-indicator {
            background: #ffebee;
            color: var(--resq-red);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Main Viewport */
        main { flex: 1; position: relative; background: #222; overflow: hidden; }
        
        #map-bg {
            width: 100%;
            height: 100%;
            background: url('https://api.mapbox.com/styles/v1/mapbox/dark-v11/static/78.39,17.49,15,0/385x600?access_token=none');
            background-size: cover;
            filter: brightness(0.7);
            transition: 0.5s ease;
        }

        /* Patient Vitals Card (Hidden until active) */
        #vitals-card {
            position: absolute;
            top: 20px;
            left: 15px;
            right: 15px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 15px;
            display: none;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 30;
        }

        .vital-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .vital-tag {
            background: rgba(0,0,0,0.05);
            padding: 8px;
            border-radius: 10px;
            text-align: center;
        }

        .vital-tag label { font-size: 9px; color: #666; font-weight: 700; display: block; }
        .vital-tag value { font-size: 13px; font-weight: 800; color: var(--resq-red); }

        /* Emergency Flash Mode */
        #dispatch-screen {
            position: absolute;
            inset: 0;
            background: var(--resq-red);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
            color: white;
            animation: urgentBlink 1s infinite alternate;
        }

        @keyframes urgentBlink {
            from { background: #D32F2F; }
            to { background: #B71C1C; }
        }

        .confirm-box {
            background: white;
            border-radius: 30px;
            padding: 25px;
            color: var(--resq-dark);
            transform: translateY(20px);
        }

        /* Action Panel */
        .bottom-ui {
            background: white;
            padding: 25px;
            border-radius: 35px 35px 0 0;
            z-index: 40;
        }

        .btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-emergency { background: var(--resq-red); color: white; }
        .btn-finish { background: var(--resq-green); color: white; }
        .btn-ghost { background: #f5f5f5; color: #555; margin-bottom: 12px; }

        /* Navigation Route Info */
        .route-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .route-info h2 { font-size: 20px; font-weight: 800; }
        .route-info p { font-size: 12px; color: #888; font-weight: 600; }

    </style>
</head>
<body>

<div class="device-container">
    <header>
        <div class="hosp-info">
            <h4>APOLLO HOSPITALS</h4>
            <p>KPHB COLONY • UNIT 4</p>
        </div>
        <div class="live-indicator">
            <i data-lucide="radio" size="14"></i> LIVE GPS
        </div>
    </header>

    <main>
        <div id="map-bg"></div>

        <div id="vitals-card">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <p style="font-size: 10px; font-weight: 800; color: var(--resq-red);">PRE-ARRIVAL VITALS</p>
                    <h3 id="patient-name-display" style="font-size: 16px;">Srinivas Rao (62M)</h3>
                </div>
                <div style="text-align: right;">
                    <span style="font-size: 10px; background: #000; color: #fff; padding: 2px 6px; border-radius: 4px;">B+ VE</span>
                </div>
            </div>
            <div class="vital-grid">
                <div class="vital-tag"><label>HEART RATE</label><value>112 BPM</value></div>
                <div class="vital-tag"><label>SPO2</label><value>91%</value></div>
                <div class="vital-tag"><label>BP</label><value>140/95</value></div>
            </div>
        </div>

        <div id="dispatch-screen">
            <div style="text-align: center; margin-bottom: 40px;">
                <i data-lucide="alert-octagon" size="60" style="margin-bottom: 10px;"></i>
                <h1 style="font-size: 32px; letter-spacing: -1px;">EMERGENCY<br>DETECTION</h1>
            </div>
            <div class="confirm-box">
                <p style="font-size: 11px; font-weight: 800; color: #999; margin-bottom: 5px;">PICKUP LOCATION</p>
                <h2 style="font-size: 18px; line-height: 1.2; margin-bottom: 15px;">Miyapur Metro Station,<br>Main Entrance</h2>
                <div style="display: flex; gap: 20px; padding: 15px 0; border-top: 1px solid #eee;">
                    <div><label style="font-size: 9px; display: block; color: #888;">ETA</label><b>5 MINS</b></div>
                    <div><label style="font-size: 9px; display: block; color: #888;">DIST</label><b>2.4 KM</b></div>
                </div>
                <button class="btn btn-emergency" onclick="acceptMission()">ACCEPT DISPATCH</button>
            </div>
        </div>
    </main>

    <section class="bottom-ui">
        <div id="idle-state">
            <div style="text-align: center; padding: 10px 0 25px;">
                <div style="width: 50px; height: 4px; background: #e0e0e0; margin: 0 auto 20px; border-radius: 10px;"></div>
                <p style="font-weight: 700; color: #666; font-size: 14px;">Awaiting Emergency Request...</p>
            </div>
            <button class="btn btn-ghost" onclick="triggerDispatch()">SIMULATE DISPATCH</button>
        </div>

        <div id="active-state" style="display: none;">
            <div class="route-info">
                <div>
                    <p>DESTINATION</p>
                    <h2 id="route-text">En Route to Pickup</h2>
                </div>
                <div style="text-align: right;">
                    <p>TOTAL TIME</p>
                    <h2 style="color: var(--resq-red);">08:12</h2>
                </div>
            </div>
            <button class="btn btn-emergency" id="main-action" onclick="progressTrip()">MARK: ARRIVED AT SITE</button>
        </div>
    </section>
</div>

<script>
    lucide.createIcons();

    let currentPhase = 0; // 0: Idle, 1: En Route, 2: At Site, 3: Transporting

    function triggerDispatch() {
        document.getElementById('dispatch-screen').style.display = 'flex';
    }

    function acceptMission() {
        document.getElementById('dispatch-screen').style.display = 'none';
        document.getElementById('idle-state').style.display = 'none';
        document.getElementById('active-state').style.display = 'block';
        document.getElementById('vitals-card').style.display = 'block';
        document.getElementById('map-bg').style.filter = 'brightness(1)';
        currentPhase = 1;
    }

    function progressTrip() {
        const btn = document.getElementById('main-action');
        const routeText = document.getElementById('route-text');

        if (currentPhase === 1) {
            currentPhase = 2;
            btn.innerText = "START TRANSPORT TO HOSPITAL";
            btn.style.background = "var(--resq-dark)";
            routeText.innerText = "Patient On-Board";
            alert("Patient vitals synced with Hospital Dashboard.");
        } else if (currentPhase === 2) {
            currentPhase = 3;
            btn.innerText = "COMPLETE HANDOVER";
            btn.style.background = "var(--resq-green)";
            routeText.innerText = "Arriving at Apollo";
        } else {
            location.reload(); // End trip and reset demo
        }
    }
</script>
</body>
</html>
